# ──────────────────────────────────────────────────────────────────────
# Render.com deployment config for the AEGIS FastAPI backend
# Docs: https://render.com/docs/blueprint-spec
# ──────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: aegis-swarm-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set manually in the Render dashboard
      - key: AEGIS_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
    autoDeploy: true
